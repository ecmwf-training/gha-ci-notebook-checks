name: Notebook QA

on:
  workflow_call:
    inputs:
      notebooks:
        description: "Space-separated list of notebook paths to check (default: all *.ipynb)"
        required: false
        type: string
        default: ""
      execution_runner:
        description: "Runner for notebook execution (supports self-hosted)"
        required: false
        type: string
        default: "ubuntu-latest"
      execution_timeout:
        description: "Timeout in minutes for notebook execution job"
        required: false
        type: number
        default: 60
      qa_tools_repo:
        description: "Repository containing QA tools"
        required: false
        type: string
        default: "ecmwf-training/reusable-workflows"
      jira_create_ticket:
        description: "Create Jira ticket on failure (requires JIRA_* secrets)"
        required: false
        type: boolean
        default: false
      jira_issue_type:
        description: "Jira issue type for failure tickets"
        required: false
        type: string
        default: "Bug"
      jira_labels:
        description: "Comma-separated labels for Jira ticket"
        required: false
        type: string
        default: "notebook-qa,automated"
    secrets:
      JIRA_BASE_URL:
        required: false
      JIRA_USER_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      JIRA_PROJECT_KEY:
        required: false

env:
  QA_OUTPUT_DIR: qa_outputs${{ github.run_id }}

jobs:
  # Job 0: Collect notebooks to check (shared by all jobs)
  collect:
    runs-on: ubuntu-latest
    outputs:
      notebooks: ${{ steps.notebooks.outputs.files }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch PR base for diff
        if: github.event.pull_request.base.sha != ''
        run: git fetch --depth=1 origin "$BASE_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Get notebooks
        id: notebooks
        env:
          INPUT_NOTEBOOKS: ${{ inputs.notebooks }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$INPUT_NOTEBOOKS" ]; then
            NBS=$(printf '%s\n' $INPUT_NOTEBOOKS)
          elif [ -n "$BASE_SHA" ]; then
            NBS=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD -- '*.ipynb' \
              | grep -v '\.ipynb_checkpoints/' \
              | sed 's|^|./|' || true)
          else
            NBS=$(find . -name '*.ipynb' -not -path '*/.ipynb_checkpoints/*')
          fi
          if [ -z "$NBS" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No notebooks found."
          else
            {
              echo "files<<__NB_EOF__"
              echo "$NBS"
              echo "__NB_EOF__"
            } >> "$GITHUB_OUTPUT"
            echo "Notebooks:"
            echo "$NBS"
          fi

  # Job 1: Static checks (fast, run on default runner)
  lint:
    needs: collect
    runs-on: ubuntu-latest
    outputs:
      linter_result: ${{ steps.linter.outcome }}
      formatter_result: ${{ steps.formatter.outcome }}
      pynblint_result: ${{ steps.pynblint.outcome }}
      link_result: ${{ steps.link_checker.outcome }}
      test_result: ${{ steps.test_checker.outcome }}
      figure_result: ${{ steps.figure_checker.outcome }}
      metadata_result: ${{ steps.metadata_checker.outcome }}
      accessibility_result: ${{ steps.accessibility_checker.outcome }}
      license_result: ${{ steps.license.outcome }}
      changelog_result: ${{ steps.changelog.outcome }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout QA tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.qa_tools_repo }}
          path: .tmp/${{ github.run_id }}-qa-tools
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install QA tools
        working-directory: .tmp/${{ github.run_id }}-qa-tools
        run: |
          uv sync --frozen --no-install-project
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      # Load QA configuration
      - name: Load QA config
        id: config
        env:
          ALL_NOTEBOOKS: ${{ needs.collect.outputs.notebooks }}
        run: |
          python .tmp/${{ github.run_id }}-qa-tools/process-notebooks/checkers/write_gha_config.py \
            --checks linter formatter pynblint links tests figures metadata data_source accessibility license changelog \
            --config .github/notebook-qa.yml \
            --extras

      # Linting checks
      - name: (2.2.3) Run linter
        id: linter
        if: (success() || failure()) && steps.config.outputs.skip_linter != 'true' && steps.config.outputs.notebooks_linter != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_linter }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          ruff check "${nbs[@]}"

      - name: (2.2.3) Run formatter
        id: formatter
        if: (success() || failure()) && steps.config.outputs.skip_formatter != 'true' && steps.config.outputs.notebooks_formatter != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_formatter }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          ruff format --check --diff "${nbs[@]}"

      - name: (2.2.3) Run pynblint
        id: pynblint
        if: (success() || failure()) && steps.config.outputs.skip_pynblint != 'true' && steps.config.outputs.notebooks_pynblint != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_pynblint }}
          PYNBLINT_EXCLUDE: ${{ steps.config.outputs.pynblint_exclude }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          failed=0
          for nb in "${nbs[@]}"; do
            echo "Checking: $nb"
            output_file="/tmp/pynblint_$(basename "$nb" .ipynb).json"
            if [ -n "$PYNBLINT_EXCLUDE" ]; then
              pynblint "$nb" -o "$output_file" --exclude "$PYNBLINT_EXCLUDE"
            else
              pynblint "$nb" -o "$output_file"
            fi

            # Parse JSON to check for lints (pynblint always exits 0)
            lint_count=$(python -c "import json; print(len(json.load(open('$output_file'))['lints']))")
            if [ "$lint_count" -gt 0 ]; then
              echo "❌ $nb has $lint_count pynblint issue(s):"
              python -c "
          import json
          data = json.load(open('$output_file'))
          for lint in data['lints']:
              print(f\"  - ({lint['slug']}) {lint['description']}\")
          "
              failed=1
            else
              echo "✅ $nb passed pynblint"
            fi
          done
          exit $failed

      # Link checking with lychee (fast, Rust-based)
      - name: (1.2.3) Check links
        id: link_checker
        if: (success() || failure()) && steps.config.outputs.skip_links != 'true' && steps.config.outputs.notebooks_links != ''
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --verbose --no-progress ${{ steps.config.outputs.notebooks_links }}
          fail: true

      # Test coverage (direct pytest-cov)
      - name: (2.3.1, 2.3.2) Check tests and coverage
        id: test_checker
        if: (success() || failure()) && steps.config.outputs.skip_tests != 'true'
        env:
          REQUIRE_TESTS: ${{ steps.config.outputs.require_tests }}
          COVERAGE_THRESHOLD: ${{ steps.config.outputs.coverage_threshold }}
        run: |
          if ls test_*.py *_test.py tests/*.py 2>/dev/null; then
            pytest --cov=. --cov-report=term --cov-fail-under="$COVERAGE_THRESHOLD"
          else
            echo "::warning::No test files found"
            if [ "$REQUIRE_TESTS" = "true" ]; then
              echo "Tests are required by configuration (require_tests: true)"
              exit 1
            fi
          fi

      # Custom checks
      - name: (3.3.2) Check figure labels and sources
        id: figure_checker
        if: (success() || failure()) && steps.config.outputs.skip_figures != 'true' && steps.config.outputs.notebooks_figures != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_figures }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          python .tmp/${{ github.run_id }}-qa-tools/process-notebooks/checkers/figure_checker.py \
            --config .github/notebook-qa.yml \
            "${nbs[@]}"

      # Metadata version check
      - name: (1.2.6) Check version metadata
        id: metadata_checker
        if: (success() || failure()) && steps.config.outputs.skip_metadata != 'true' && steps.config.outputs.notebooks_metadata != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_metadata }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          python .tmp/${{ github.run_id }}-qa-tools/process-notebooks/checkers/metadata_checker.py \
            --config .github/notebook-qa.yml \
            "${nbs[@]}"

      # Data source check (warning only, criterion 1.2.8)
      - name: (1.2.8) Check data sources
        id: data_source_checker
        if: (success() || failure()) && steps.config.outputs.skip_data_source != 'true' && steps.config.outputs.notebooks_data_source != ''
        env:
          NOTEBOOKS: ${{ steps.config.outputs.notebooks_data_source }}
        run: |
          mapfile -t nbs <<< "$NOTEBOOKS"
          python .tmp/${{ github.run_id }}-qa-tools/process-notebooks/checkers/data_source_checker.py \
            --config .github/notebook-qa.yml \
            "${nbs[@]}"

      # Accessibility check
      - name: (3.1.3) Check accessibility
        id: accessibility_checker
        if: (success() || failure()) && steps.config.outputs.skip_accessibility != 'true' && steps.config.outputs.notebooks_accessibility != ''
        uses: berkeley-dsep-infra/jupyterlab-a11y-checker@c77482165508460d671cdad6ecdff5ac72ab6063
        with:
          files: ${{ steps.config.outputs.notebooks_accessibility }}

      # File existence checks
      - name: (1.2.4) Check LICENSE
        id: license
        if: (success() || failure()) && steps.config.outputs.skip_license != 'true'
        run: |
          if [ -s LICENSE ]; then
            echo "✅ LICENSE file is present and non-empty"
          else
            echo "❌ LICENSE file is missing or empty"
            exit 1
          fi

      - name: (4.2.3) Check CHANGELOG
        id: changelog
        if: (success() || failure()) && steps.config.outputs.skip_changelog != 'true'
        run: |
          if [ -s CHANGELOG.md ]; then
            echo "✅ CHANGELOG.md file is present and non-empty"
          else
            echo "❌ CHANGELOG.md file is missing or empty"
            exit 1
          fi

  # Job 2: Notebook execution (resource-intensive, configurable runner)
  execute:
    needs: collect
    runs-on: ${{ inputs.execution_runner }}
    timeout-minutes: ${{ inputs.execution_timeout }}
    outputs:
      execute_result: ${{ steps.execute_notebooks.outcome }}
    defaults:
      run:
        shell: bash -el {0}
    env:
      CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }} # zizmor: ignore[secrets-outside-env]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout QA tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.qa_tools_repo }}
          path: .tmp/${{ github.run_id }}-qa-tools
          persist-credentials: false

      # Load QA config to check if execute is disabled
      - name: Load QA config
        id: config
        env:
          ALL_NOTEBOOKS: ${{ needs.collect.outputs.notebooks }}
        run: |
          python3 .tmp/${{ github.run_id }}-qa-tools/process-notebooks/checkers/write_gha_config.py \
            --checks execute \
            --config .github/notebook-qa.yml

      - name: Skip execution check
        if: steps.config.outputs.skip_execute == 'true' || steps.config.outputs.notebooks_execute == ''
        run: echo "Notebook execution skipped by configuration"

      - name: Set up Conda
        if: steps.config.outputs.skip_execute != 'true' && steps.config.outputs.notebooks_execute != ''
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
        with:
          miniforge-version: latest
          activate-environment: notebook-qa
          environment-file: environment.yml
          use-mamba: true

      - name: Install execution tools
        if: steps.config.outputs.skip_execute != 'true' && steps.config.outputs.notebooks_execute != ''
        run: pip install ploomber-engine psutil matplotlib pyyaml

      - name: Configure CDS API
        if: steps.config.outputs.skip_execute != 'true' && steps.config.outputs.notebooks_execute != '' && env.CDSAPI_KEY != ''
        run: |
          echo "url: https://cds.climate.copernicus.eu/api" > ~/.cdsapirc
          echo "key: $CDSAPI_KEY" >> ~/.cdsapirc

      - name: (2.2.1, 2.2.4, 2.2.6) Execute notebooks with memory profiling
        id: execute_notebooks
        if: steps.config.outputs.skip_execute != 'true' && steps.config.outputs.notebooks_execute != ''
        env:
          NOTEBOOKS_EXECUTE: ${{ steps.config.outputs.notebooks_execute }}
        run: |
          python << 'EOF'
          import os
          import csv
          from pathlib import Path
          from ploomber_engine import execute_notebook
          from ploomber_engine.profiling import get_profiling_data

          notebooks = [nb for nb in os.environ['NOTEBOOKS_EXECUTE'].splitlines() if nb.strip()]
          output_dir = os.environ.get('QA_OUTPUT_DIR', 'qa_outputs')
          Path(output_dir).mkdir(parents=True, exist_ok=True)

          failed = []
          for nb in notebooks:
              if not nb.strip():
                  continue
              print(f"\n{'='*60}")
              print(f"Executing: {nb}")
              print('='*60)
              try:
                  result = execute_notebook(
                      nb,
                      output_path=nb,
                      profile_memory=True,
                      progress_bar=False
                  )
                  # Save profiling data from cell metadata
                  data = get_profiling_data(result)
                  if data.get('memory') or data.get('runtime'):
                      csv_path = Path(output_dir) / f"{Path(nb).stem}-profiling-data.csv"
                      with open(csv_path, 'w', newline='') as f:
                          writer = csv.DictWriter(f, fieldnames=['cell', 'memory', 'runtime'])
                          writer.writeheader()
                          for i, (mem, time) in enumerate(zip(
                              data.get('memory', []),
                              data.get('runtime', [])
                          )):
                              writer.writerow({'cell': i, 'memory': mem, 'runtime': time})
                  else:
                      print(f"::warning::No profiling data returned for {nb}")
                  print(f"✅ {nb} executed successfully")
              except Exception as e:
                  print(f"❌ {nb} failed: {e}")
                  failed.append(nb)

          if failed:
              print(f"\n❌ {len(failed)} notebook(s) failed to execute:")
              for nb in failed:
                  print(f"  - {nb}")
              exit(1)
          EOF

      - name: Upload profiling artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: notebook-profiling-${{ github.run_id }}
          path: ${{ env.QA_OUTPUT_DIR }}
          if-no-files-found: ignore

  # Job 3: Create Jira ticket on failure (optional)
  notify-failure:
    needs: [lint, execute]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      inputs.jira_create_ticket == true &&
      (needs.lint.result == 'failure' || needs.execute.result == 'failure')
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@ca13f8850ea309cf44a6e4e0c49d9aa48ac3ca4c # v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }} # zizmor: ignore[secrets-outside-env]
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }} # zizmor: ignore[secrets-outside-env]
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Build failure summary
        id: summary
        env:
          LINT_LINTER: ${{ needs.lint.outputs.linter_result }}
          LINT_FORMATTER: ${{ needs.lint.outputs.formatter_result }}
          LINT_PYNBLINT: ${{ needs.lint.outputs.pynblint_result }}
          LINT_LINKS: ${{ needs.lint.outputs.link_result }}
          LINT_TESTS: ${{ needs.lint.outputs.test_result }}
          LINT_FIGURES: ${{ needs.lint.outputs.figure_result }}
          LINT_METADATA: ${{ needs.lint.outputs.metadata_result }}
          LINT_A11Y: ${{ needs.lint.outputs.accessibility_result }}
          LINT_LICENSE: ${{ needs.lint.outputs.license_result }}
          LINT_CHANGELOG: ${{ needs.lint.outputs.changelog_result }}
          EXEC_RESULT: ${{ needs.execute.outputs.execute_result }}
          JIRA_LABELS_INPUT: ${{ inputs.jira_labels }}
        run: |
          # Build a list of failed checks
          FAILED_CHECKS=""

          # Lint job checks
          [ "$LINT_LINTER" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Linter (ruff check)\n"
          [ "$LINT_FORMATTER" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Formatter (ruff format)\n"
          [ "$LINT_PYNBLINT" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Pynblint\n"
          [ "$LINT_LINKS" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Link checker\n"
          [ "$LINT_TESTS" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Tests/coverage\n"
          [ "$LINT_FIGURES" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Figure labels/sources\n"
          [ "$LINT_METADATA" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Version metadata\n"
          [ "$LINT_A11Y" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Accessibility\n"
          [ "$LINT_LICENSE" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- LICENSE file\n"
          [ "$LINT_CHANGELOG" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- CHANGELOG\n"

          # Execute job
          [ "$EXEC_RESULT" = "failure" ] && FAILED_CHECKS="${FAILED_CHECKS}- Notebook execution\n"

          echo "failed_checks<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILED_CHECKS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Convert comma-separated labels to JSON array
          LABELS_JSON=$(echo "$JIRA_LABELS_INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s .)
          echo "labels_json=$LABELS_JSON" >> $GITHUB_OUTPUT

      - name: Create Jira ticket
        uses: atlassian/gajira-create@1ff0b6bd115a780592b47bfbb63fc4629132e6ec # v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }} # zizmor: ignore[secrets-outside-env]
          issuetype: ${{ inputs.jira_issue_type }}
          summary: "[Notebook QA] Checks failed in ${{ github.repository }} (${{ github.ref_name }})"
          description: |
            h2. Notebook QA Workflow Failure

            *Repository:* ${{ github.repository }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* ${{ github.sha }}
            *Workflow Run:* [View logs|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}]

            h3. Failed Checks
            ${{ steps.summary.outputs.failed_checks }}

            h3. Triggered By
            ${{ github.event.head_commit.message || github.event.pull_request.title || 'Manual run' }}
          fields: '{"labels": ${{ steps.summary.outputs.labels_json }}}'
